name: wp-plugin-readme2md
description: Convert WordPress plugin readme.txt files to markdown format for better display on GitHub.

inputs:
  include:
    description: 'Comma-separated list of dynamic badges to include (stars, forks, watchers, last-commit, downloads). Order controls badge placement.'
    default: ''
  badge-style:
    description: 'Shield style for dynamic badges (flat, flat-square, plastic, for-the-badge, social)'
    default: 'flat'

branding:
  icon: "file-text"
  color: "blue"

runs:
  using: composite
  steps:
    - name: Set Up PHP (Version 8.0)
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.0'

    - name: Run Readme Converter
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
      run: |
        php "$ACTION_PATH/scripts/ReadmeConverter.php" \
          ${{ inputs.include != '' && format('--include={0}', inputs.include) || '' }} \
          --badge-style=${{ inputs.badge-style }}
